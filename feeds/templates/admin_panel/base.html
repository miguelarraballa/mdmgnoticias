<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Panel — MDMG Noticias{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  {% load static %}
  <link rel="icon" type="image/x-icon" href="{% static 'feeds/img/favicon.ico' %}">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'feeds/img/favicon-32x32.png' %}">
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'feeds/img/apple-touch-icon.png' %}">
  <link rel="stylesheet" href="{% static 'feeds/css/main.css' %}">
  <style>
    body { background: #f8f9fa; }
    .admin-nav { background: #1a1a2e; }
    .admin-nav .navbar-brand { color: #fff; font-weight: 700; }
    .admin-nav .nav-link { color: rgba(255,255,255,.8); }
    .admin-nav .nav-link:hover, .admin-nav .nav-link.active { color: #fff; }
    .admin-sidebar { min-height: calc(100vh - 56px); background: #fff; border-right: 1px solid #dee2e6; }
    .sidebar-link { display: flex; align-items: center; gap: .55rem; padding: .45rem 1rem; color: #495057; text-decoration: none; border-radius: .375rem; margin-bottom: 2px; font-size: .9rem; }
    .sidebar-link:hover { background: #f1f3f5; color: #212529; }
    .sidebar-link.active { background: #e8f0fe; color: #1a73e8; font-weight: 500; }
    .sidebar-link i { font-size: 1rem; flex-shrink: 0; }
    .main-content { padding: 1.5rem; }
    .feed-logo {
      width: 28px; height: 28px; border-radius: 6px;
      object-fit: contain; background: #f1f3f5;
    }
    .feed-logo-default {
      width: 28px; height: 28px; border-radius: 6px;
      background: #e8f0fe; color: #1a73e8;
      font-size: .75rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

<nav class="navbar admin-nav px-3">
  <a class="navbar-brand d-flex align-items-center gap-2" href="/panel/"><img src="{% static 'feeds/img/logo.svg' %}" alt="" class="brand-logo brand-logo-admin"> MDMG Noticias</a>
  <div class="ms-auto">
    <a href="/" class="btn btn-sm btn-outline-light me-2"><i class="bi bi-box-arrow-up-right"></i> Ver sitio</a>
    <form method="post" action="{% url 'admin_logout' %}" class="d-inline">
      {% csrf_token %}
      <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Salir</button>
    </form>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <div class="col-md-2 px-0 admin-sidebar d-none d-md-block">
      <div class="p-3">
        <p class="text-muted small text-uppercase fw-bold px-2 mb-1">Gestión</p>
        <a href="{% url 'admin_dashboard' %}" class="sidebar-link {% block nav_dashboard %}{% endblock %}"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="{% url 'admin_feed_list' %}" class="sidebar-link {% block nav_feeds %}{% endblock %}"><i class="bi bi-rss"></i> Feeds</a>
        <a href="{% url 'admin_opml_list' %}" class="sidebar-link {% block nav_opml %}{% endblock %}"><i class="bi bi-file-earmark-arrow-up"></i> OPML subidos</a>
        <a href="{% url 'admin_medio_list' %}" class="sidebar-link {% block nav_medios %}{% endblock %}"><i class="bi bi-collection"></i> Medios</a>
        <a href="{% url 'admin_category_list' %}" class="sidebar-link {% block nav_categories %}{% endblock %}"><i class="bi bi-tag"></i> Categorías</a>
        <hr class="my-2">
        <a href="{% url 'admin_settings' %}" class="sidebar-link {% block nav_settings %}{% endblock %}"><i class="bi bi-gear"></i> Configuración</a>
      </div>
    </div>

    <div class="col-md-10 main-content">
      {% if messages %}
      {% for message in messages %}
      <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %}
      {% endif %}
      {% block content %}{% endblock %}
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
