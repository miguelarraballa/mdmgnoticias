<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso — News Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,.3); }
    .login-logo { font-size: 2rem; text-align: center; margin-bottom: .5rem; }
    .login-title { text-align: center; font-weight: 700; font-size: 1.25rem; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">📰</div>
    <div class="login-title">News Admin</div>
    <form method="post">
      {% csrf_token %}
      {% if form.errors %}
      <div class="alert alert-danger py-2 small">Usuario o contraseña incorrectos.</div>
      {% endif %}
      <div class="mb-3">
        <label class="form-label" for="id_username">Usuario</label>
        <input type="text" name="username" id="id_username" class="form-control" autofocus required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="id_password">Contraseña</label>
        <input type="password" name="password" id="id_password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>
  </div>
</body>
</html>
